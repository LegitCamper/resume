name: Compile Resume

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  compile-and-release:
    name: compile resume and release pdf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - run: cargo install typst-cli && typst compile resume.typ
      - uses: elgohr/Github-Release-Action@v5
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        with:
          title: Resume
          tag: newest
